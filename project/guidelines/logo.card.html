<!-- @dsCard group="Brand" viewport="700x180" name="Logo Mark — color on background" subtitle="Navy on light, gold on navy, offwhite reversed — keep clear space" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);background:#fff;}
  .row{display:flex;gap:14px;padding:18px;}
  .tile{flex:1;border-radius:12px;height:124px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-subtle);}
  .tile img{height:74px;width:auto;display:block;}
</style></head>
<body>
  <div class="row">
    <div class="tile" style="background:#fff;"><img src="../assets/logos/logo-blue.png" alt="navy logo"></div>
    <div class="tile" style="background:var(--color-offwhite);"><img src="../assets/logos/logo-gold.png" alt="gold logo"></div>
    <div class="tile" style="background:var(--color-navy);"><img src="../assets/logos/logo-gold.png" alt="gold on navy"></div>
    <div class="tile" style="background:var(--color-navy);"><img src="../assets/logos/logo-offwhite.png" alt="offwhite on navy"></div>
  </div>
</body></html>
