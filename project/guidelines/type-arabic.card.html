<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ar);background:#fff;color:var(--color-charcoal);padding:20px 24px;}
  .display{font-size:38px;font-weight:700;color:var(--color-navy);line-height:1.2;margin:0 0 6px;}
  .row{display:flex;gap:28px;align-items:baseline;border-top:1px solid var(--border-subtle);padding-top:12px;margin-top:12px;}
  .item{display:flex;flex-direction:column;gap:2px;}
  .w-light{font-weight:300;}.w-reg{font-weight:400;}.w-bold{font-weight:700;}
  .lbl{font-family:var(--font-en);font-size:11px;color:var(--color-slate);letter-spacing:.06em;text-transform:uppercase;}
  .big{font-size:22px;color:var(--color-navy);}
</style></head>
<body>
  <p class="display">مجموعة العطير العقارية</p>
  <div class="row">
    <div class="item"><span class="big w-light">عقارات راقية</span><span class="lbl">Light · 300</span></div>
    <div class="item"><span class="big w-reg">عقارات راقية</span><span class="lbl">Regular · 400</span></div>
    <div class="item"><span class="big w-bold">عقارات راقية</span><span class="lbl">Bold · 700</span></div>
  </div>
</body></html>
