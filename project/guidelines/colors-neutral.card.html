<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & Cool Tint" subtitle="Offwhite surface, charcoal/slate text, light-blue accent" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);background:#fff;}
  .row{display:flex;gap:14px;padding:18px;}
  .sw{flex:1;border-radius:10px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm);}
  .sw .nm{font-weight:700;font-size:14px;}
  .sw .hx{font-size:12px;letter-spacing:.04em;opacity:.85;}
  .sw .pn{font-size:11px;opacity:.7;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-offwhite);color:var(--color-charcoal);">
      <span class="nm">Offwhite</span>
      <div><div class="hx">#F3F2ED</div><div class="pn">PANTONE 663 C</div></div>
    </div>
    <div class="sw" style="background:var(--color-charcoal);color:#fff;">
      <span class="nm">Charcoal</span>
      <div><div class="hx">#373737</div><div class="pn">PANTONE 544 C</div></div>
    </div>
    <div class="sw" style="background:var(--color-slate);color:#fff;">
      <span class="nm">Slate</span>
      <div><div class="hx">#6F7A88</div><div class="pn">PANTONE 4128 C</div></div>
    </div>
    <div class="sw" style="background:var(--color-lightblue);color:var(--color-navy);">
      <span class="nm">Light Blue</span>
      <div><div class="hx">#C0D9E5</div><div class="pn">PANTONE 4287 C</div></div>
    </div>
  </div>
</body></html>
