<!-- @dsCard group="Type" viewport="700x190" name="Latin — Roboto" subtitle="Light / Regular / Bold — Latin, numerals & contact data" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);background:#fff;color:var(--color-charcoal);padding:20px 24px;}
  .display{font-size:36px;font-weight:700;color:var(--color-navy);line-height:1.15;margin:0 0 2px;}
  .sub{font-size:14px;color:var(--color-gold);letter-spacing:.16em;text-transform:uppercase;margin:0 0 12px;}
  .row{display:flex;gap:28px;align-items:baseline;border-top:1px solid var(--border-subtle);padding-top:12px;}
  .item{display:flex;flex-direction:column;gap:2px;}
  .w-light{font-weight:300;}.w-reg{font-weight:400;}.w-bold{font-weight:700;}
  .lbl{font-size:11px;color:var(--color-slate);letter-spacing:.06em;text-transform:uppercase;}
  .big{font-size:22px;color:var(--color-navy);}
</style></head>
<body>
  <p class="display">Al-Otair Real Estate</p>
  <p class="sub">+966 50 000 0000 · alateer.com</p>
  <div class="row">
    <div class="item"><span class="big w-light">Aa Bb 123</span><span class="lbl">Light · 300</span></div>
    <div class="item"><span class="big w-reg">Aa Bb 123</span><span class="lbl">Regular · 400</span></div>
    <div class="item"><span class="big w-bold">Aa Bb 123</span><span class="lbl">Bold · 700</span></div>
  </div>
</body></html>
