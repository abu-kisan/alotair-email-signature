<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-en);background:#fff;}
  .row{display:flex;gap:14px;padding:18px;}
  .sw{flex:1;border-radius:10px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm);}
  .sw .nm{font-weight:700;font-size:14px;}
  .sw .hx{font-family:var(--font-en);font-size:12px;letter-spacing:.04em;opacity:.85;}
  .sw .pn{font-size:11px;opacity:.7;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-navy);color:var(--color-offwhite);">
      <span class="nm">Navy</span>
      <div><div class="hx">#0B1D3B</div><div class="pn">PANTONE 2380 C</div></div>
    </div>
    <div class="sw" style="background:var(--color-gold);color:#fff;">
      <span class="nm">Gold</span>
      <div><div class="hx">#AC975F</div><div class="pn">PANTONE 4007 C</div></div>
    </div>
    <div class="sw" style="background:var(--color-gold-deep);color:#fff;">
      <span class="nm">Gold Deep</span>
      <div><div class="hx">#8E7A47</div><div class="pn">derived</div></div>
    </div>
    <div class="sw" style="background:var(--color-navy-700);color:var(--color-offwhite);">
      <span class="nm">Navy 700</span>
      <div><div class="hx">#16294B</div><div class="pn">derived</div></div>
    </div>
  </div>
</body></html>
